services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8181}:${API_PORT:-8181}"
    volumes:
      - dendrite-data:/data
    environment:
      DENDRITE_DB: /data/dendrite.db
      PORT: "${API_PORT:-8181}"
      RUST_LOG: "info"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8181}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  dendrite-data:
    driver: local
